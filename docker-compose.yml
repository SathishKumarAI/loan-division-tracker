# Loan Division Tracker — container stack.
#
# - web:     static SPA (nginx). Local-first; works with or without the backend.
# - backend: FastAPI — server-side dataset storage (SQLite on a volume) + Claude
#            PDF analysis. AI_MODE selects the Claude transport.
#
# Bring up:  docker compose up -d --build
# AI auth:   AI_MODE=claude_cli reuses your host Claude Code login via the
#            read-only ~/.claude mount. For the API instead, set
#            AI_MODE=anthropic_api and ANTHROPIC_API_KEY (e.g. in a .env file).

services:
  web:
    build:
      context: .
      target: runtime
    image: loan-division-tracker:latest
    # Host 8090 (8080 may be taken by other local apps); change freely.
    ports:
      - "8090:80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: loan-division-tracker-backend:latest
    environment:
      - AI_MODE=${AI_MODE:-claude_cli}          # claude_cli | anthropic_api | off
      - AI_MODEL=${AI_MODEL:-claude-opus-4-8}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DB_PATH=/data/loan.db
      - CORS_ORIGINS=http://localhost:8090,http://localhost:5173
    volumes:
      - loan-data:/data
      # AI_MODE=claude_cli reuses the host Claude Code login (read-only):
      - ${HOME}/.claude:/root/.claude:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  loan-data:
