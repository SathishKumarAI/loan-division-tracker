# Loan Division Tracker — container stack.
#
# Today: a single static frontend service (data persists in the browser).
# The `backend` service below is scaffolded but commented out — uncomment it
# once the AI/PDF + server-side storage direction is chosen (see
# docs/AI-AND-BACKEND.md). It is wired to a named volume so loan data and the
# SQLite DB survive container restarts.

services:
  web:
    build:
      context: .
      target: runtime
    image: loan-division-tracker:latest
    # Host 8090 (8080 may be taken by other local apps); change freely.
    ports:
      - "8090:80"
    restart: unless-stopped

